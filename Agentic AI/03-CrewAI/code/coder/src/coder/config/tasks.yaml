# Task definition for the Coder crew
# Single task: write code, run it, return both code and output
# The expected_output asks for BOTH code and output to verify it actually ran

coding_task:
  description: >
    Write python code to achieve this: {assignment}
  expected_output: >
    A text file that includes the code itself, along with the output of the code.
  agent: coder
  output_file: output/code_and_output.txt
